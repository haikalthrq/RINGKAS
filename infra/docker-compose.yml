name: ringkas

services:
  postgres:
    image: postgres:16-alpine
    container_name: ringkas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ringkas}
      POSTGRES_USER: ${POSTGRES_USER:-ringkas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ringkas} -d ${POSTGRES_DB:-ringkas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ringkas

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ringkas-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - ringkas

  rag-worker:
    build:
      context: ../services/rag-worker
      dockerfile: Dockerfile
    container_name: ringkas-rag-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ringkas:change-me-locally@postgres:5432/ringkas}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-ringkas_chunks_cf_qwen3_embedding_v1}
      QDRANT_DENSE_VECTOR_SIZE: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
      DENSE_TOP_K: ${DENSE_TOP_K:-20}
      SPARSE_TOP_K: ${SPARSE_TOP_K:-20}
      RRF_K: ${RRF_K:-60}
      FINAL_TOP_K: ${FINAL_TOP_K:-10}
      QDRANT_DENSE_DISTANCE: ${QDRANT_DENSE_DISTANCE:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-${CLOUDFLARE_WORKERS_AI_TOKEN:-}}
      CLOUDFLARE_WORKERS_AI_EMBEDDING_MODEL: ${CLOUDFLARE_WORKERS_AI_EMBEDDING_MODEL:-@cf/qwen/qwen3-embedding-0.6b}
      CLOUDFLARE_WORKERS_AI_EMBEDDING_CONNECT_TIMEOUT_SECONDS: ${CLOUDFLARE_WORKERS_AI_EMBEDDING_CONNECT_TIMEOUT_SECONDS:-10}
      CLOUDFLARE_WORKERS_AI_EMBEDDING_READ_TIMEOUT_SECONDS: ${CLOUDFLARE_WORKERS_AI_EMBEDDING_READ_TIMEOUT_SECONDS:-60}
      PDF_STORAGE_PATH: ${PDF_STORAGE_PATH:-/data/ringkas/pdfs}
      PDF_MAX_SIZE_BYTES: ${PDF_MAX_SIZE_BYTES:-52428800}
      PDF_CONNECT_TIMEOUT_SECONDS: ${PDF_CONNECT_TIMEOUT_SECONDS:-10}
      PDF_READ_TIMEOUT_SECONDS: ${PDF_READ_TIMEOUT_SECONDS:-60}
      PDF_TOTAL_TIMEOUT_SECONDS: ${PDF_TOTAL_TIMEOUT_SECONDS:-300}
      PDF_MAX_REDIRECTS: ${PDF_MAX_REDIRECTS:-5}
      PDF_ALLOWED_HOSTS: ${PDF_ALLOWED_HOSTS:-}
      BPS_API_KEY: ${BPS_API_KEY:-}
      BPS_BASE_URL: ${BPS_BASE_URL:-https://webapi.bps.go.id/v1/api/list}
      BPS_PUBLICATIONS_PATH: ${BPS_PUBLICATIONS_PATH:-}
      BPS_PUBLICATION_KEYWORD: ${BPS_PUBLICATION_KEYWORD:-}
      INGESTION_POLL_INTERVAL_SECONDS: ${INGESTION_POLL_INTERVAL_SECONDS:-10}
      DATABASE_CONNECT_TIMEOUT_SECONDS: ${DATABASE_CONNECT_TIMEOUT_SECONDS:-10}
      DATABASE_STATEMENT_TIMEOUT_MS: ${DATABASE_STATEMENT_TIMEOUT_MS:-30000}
      CHUNK_SIZE_MIN: ${CHUNK_SIZE_MIN:-500}
      CHUNK_SIZE_MAX: ${CHUNK_SIZE_MAX:-800}
      CHUNK_OVERLAP_PERCENT: ${CHUNK_OVERLAP_PERCENT:-20}
      OCR_ENABLED: ${OCR_ENABLED:-false}
    volumes:
      - pdf_storage:/data/ringkas/pdfs
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - ringkas

  rag-query:
    build:
      context: ../services/rag-worker
      dockerfile: Dockerfile
    container_name: ringkas-rag-query
    restart: unless-stopped
    entrypoint: ["python", "-m", "ringkas_worker.query_service"]
    expose:
      - "8081"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://ringkas:change-me-locally@postgres:5432/ringkas}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-ringkas_chunks_cf_qwen3_embedding_v1}
      QDRANT_DENSE_VECTOR_SIZE: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
      DENSE_TOP_K: ${DENSE_TOP_K:-20}
      SPARSE_TOP_K: ${SPARSE_TOP_K:-20}
      RRF_K: ${RRF_K:-60}
      FINAL_TOP_K: ${FINAL_TOP_K:-10}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-${CLOUDFLARE_WORKERS_AI_TOKEN:-}}
      CLOUDFLARE_WORKERS_AI_EMBEDDING_MODEL: ${CLOUDFLARE_WORKERS_AI_EMBEDDING_MODEL:-@cf/qwen/qwen3-embedding-0.6b}
      CLOUDFLARE_WORKERS_AI_EMBEDDING_CONNECT_TIMEOUT_SECONDS: ${CLOUDFLARE_WORKERS_AI_EMBEDDING_CONNECT_TIMEOUT_SECONDS:-10}
      CLOUDFLARE_WORKERS_AI_EMBEDDING_READ_TIMEOUT_SECONDS: ${CLOUDFLARE_WORKERS_AI_EMBEDDING_READ_TIMEOUT_SECONDS:-60}
      RAG_INTERNAL_TOKEN: ${RAG_INTERNAL_TOKEN:-}
      RAG_QUERY_PORT: 8081
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - ringkas

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: ringkas-api
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_HTTP_PORTS: 8080
      DATABASE_URL: ${DATABASE_URL:-postgresql://ringkas:change-me-locally@postgres:5432/ringkas}
      NVIDIA_NIM_API_KEY: ${NVIDIA_NIM_API_KEY:-}
      NVIDIA_NIM_GENERATION_MODEL: ${NVIDIA_NIM_GENERATION_MODEL:-nvidia/nemotron-3-nano-30b-a3b}
      NVIDIA_NIM_GENERATION_BASE_URL: ${NVIDIA_NIM_GENERATION_BASE_URL:-https://integrate.api.nvidia.com/v1}
      NVIDIA_NIM_GENERATION_ALLOWED_HOSTS: ${NVIDIA_NIM_GENERATION_ALLOWED_HOSTS:-integrate.api.nvidia.com}
      NVIDIA_NIM_GENERATION_TIMEOUT_SECONDS: ${NVIDIA_NIM_GENERATION_TIMEOUT_SECONDS:-60}
      NVIDIA_NIM_GENERATION_SECONDARY_MODEL: ${NVIDIA_NIM_GENERATION_SECONDARY_MODEL:-mistralai/mistral-small-4-119b-2603}
      NVIDIA_NIM_GENERATION_LIGHTWEIGHT_MODEL: ${NVIDIA_NIM_GENERATION_LIGHTWEIGHT_MODEL:-nvidia/nemotron-mini-4b-instruct}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-${CLOUDFLARE_WORKERS_AI_TOKEN:-}}
      CLOUDFLARE_WORKERS_AI_GENERATION_MODEL: ${CLOUDFLARE_WORKERS_AI_GENERATION_MODEL:-@cf/meta/llama-3.3-70b-instruct-fp8-fast}
      CLOUDFLARE_WORKERS_AI_EXPERIMENTAL_MODEL: ${CLOUDFLARE_WORKERS_AI_EXPERIMENTAL_MODEL:-@cf/meta/llama-4-scout-17b-16e-instruct}
      CLOUDFLARE_WORKERS_AI_GENERATION_TIMEOUT_SECONDS: ${CLOUDFLARE_WORKERS_AI_GENERATION_TIMEOUT_SECONDS:-60}
      RAG_QUERY_BASE_URL: ${RAG_QUERY_BASE_URL:-http://rag-query:8081/}
      RAG_QUERY_ALLOWED_AUTHORITIES: ${RAG_QUERY_ALLOWED_AUTHORITIES:-rag-query:8081}
      RAG_QUERY_TIMEOUT_SECONDS: ${RAG_QUERY_TIMEOUT_SECONDS:-30}
      RAG_INTERNAL_TOKEN: ${RAG_INTERNAL_TOKEN:-}
      GUEST_PROMPT_QUOTA: ${GUEST_PROMPT_QUOTA:-1}
      REGISTERED_DAILY_QUOTA: ${REGISTERED_DAILY_QUOTA:-}
      PDF_STORAGE_PATH: ${PDF_STORAGE_PATH:-/data/ringkas/pdfs}
    volumes:
      - pdf_storage:/data/ringkas/pdfs:ro
    depends_on:
      postgres:
        condition: service_healthy
      rag-query:
        condition: service_started
    networks:
      - ringkas

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        # Next.js compiles this rewrite target during image build. Rebuild to change it.
        API_PROXY_TARGET: http://api:8080
    container_name: ringkas-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - ringkas

volumes:
  postgres_data:
  qdrant_storage:
  pdf_storage:

networks:
  ringkas:
    driver: bridge
